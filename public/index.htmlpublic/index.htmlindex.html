<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Brief — Podcast Digest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink: #0d0d0d; --paper: #f5f0e8; --cream: #ede8db; --accent: #c8401a; --gold: #b8933f; --muted: #7a7060; --card-bg: #faf7f2; --border: #d4ccbb; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .masthead { background: var(--ink); color: var(--paper); text-align: center; padding: 28px 20px 20px; }
  .masthead-top { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto 12px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(245,240,232,0.5); }
  .masthead h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 6vw, 3.8rem); font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
  .masthead h1 span { color: var(--accent); }
  .masthead-sub { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,240,232,0.45); margin-top: 8px; }
  .rule { height: 1px; background: rgba(245,240,232,0.15); margin: 14px auto 0; max-width: 900px; }
  .container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }
  .datebar { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 2px solid var(--ink); margin-bottom: 24px; }
  .datebar-date { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; }
  .datebar-count { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .refresh-btn { background: var(--accent); color: white; border: none; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 8px; width: 100%; justify-content: center; margin-bottom: 20px; transition: background 0.2s; }
  .refresh-btn:hover { background: #a8331a; }
  .refresh-btn:disabled { background: var(--muted); cursor: not-allowed; }
  .spinning { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-bar { background: var(--cream); border: 1px solid var(--border); padding: 10px 16px; font-size: 12px; color: var(--muted); margin-bottom: 16px; display: none; align-items: center; gap: 8px; }
  .status-bar.visible { display: flex; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .progress-bar { height: 3px; background: var(--border); margin-bottom: 20px; overflow: hidden; border-radius: 2px; display: none; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
  .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); padding: 10px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 0; display: flex; justify-content: space-between; align-items: center; }
  .new-tag { background: var(--accent); color: white; font-size: 9px; padding: 2px 7px; letter-spacing: 0.1em; }
  .episodes-grid { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 32px; }
  .episode-card { background: var(--card-bg); animation: slideIn 0.35s ease both; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .episode-header { padding: 18px 20px 14px; cursor: pointer; display: grid; grid-template-columns: 36px 1fr auto; gap: 12px; align-items: start; }
  .episode-header:hover { background: var(--cream); }
  .ep-number { font-family: 'Playfair Display', serif; font-size: 11px; font-weight: 700; color: var(--accent); padding-top: 3px; }
  .ep-show { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .ep-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; line-height: 1.3; margin-bottom: 5px; }
  .ep-meta { display: flex; gap: 12px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .worth-badge { flex-shrink: 0; padding: 4px 9px; border-radius: 2px; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .worth-yes { background: #1a5c1a; color: #d4f0d4; }
  .worth-maybe { background: #5c4a1a; color: #f0e0b0; }
  .worth-no { background: #3a1a1a; color: #f0c0b0; }
  .worth-err { background: #3a3a3a; color: #999; }
  .episode-body { display: none; padding: 16px 20px 20px 68px; border-top: 1px solid var(--border); }
  .episode-body.open { display: block; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .summary-block { background: var(--paper); border: 1px solid var(--border); padding: 12px 14px; }
  .summary-block h4 { font-size: 9px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
  .summary-block p, .summary-block li { font-size: 13px; line-height: 1.6; color: #2a2a2a; }
  .summary-block ul { list-style: none; padding: 0; }
  .summary-block ul li { padding: 2px 0 2px 14px; position: relative; }
  .summary-block ul li::before { content: '-'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
  .tldr { grid-column: 1 / -1; background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .tldr h4 { color: rgba(245,240,232,0.4); border-color: rgba(245,240,232,0.15); }
  .tldr p { color: var(--paper); font-size: 14px; font-style: italic; }
  .ep-links { display: flex; gap: 12px; flex-wrap: wrap; }
  .ep-link { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent); padding-bottom: 1px; cursor: pointer; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .big { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 12px; opacity: 0.2; }
  .empty-state p { font-size: 14px; line-height: 1.8; }
</style>
</head>
<body>
<div class="masthead">
  <div class="masthead-top"><span>Personal Digest</span><span id="masthead-date"></span><span>20 Podcasts</span></div>
  <h1>Morning <span>Brief</span></h1>
  <div class="masthead-sub">Podcast Intelligence - Daily Edition</div>
  <div class="rule"></div>
</div>
<div class="container">
  <div class="datebar">
    <span class="datebar-date" id="datebar-date"></span>
    <span class="datebar-count" id="datebar-count">Ready to check 20 shows</span>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="runDigest()">
    <span id="spinIcon">&#8635;</span> Check All Podcasts for New Episodes
  </button>
  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="status-bar" id="statusBar"><div class="status-dot"></div><span id="statusText">Starting...</span></div>
  <div id="resultsArea">
    <div class="empty-state"><div class="big">&#9749;</div><p>Hit the button above to check all 20 podcasts.<br>New episodes will be summarized automatically.</p></div>
  </div>
</div>
<script>
let lastSeen = {};
try { lastSeen = JSON.parse(localStorage.getItem('mbLastSeen') || '{}'); } catch(e) {}
let podcastNames = [];
function isNew(name, date) { return !lastSeen[name] || new Date(date) > new Date(lastSeen[name]); }
function wClass(w) { return w==='YES'?'worth-yes':w==='NO'?'worth-no':w==='MAYBE'?'worth-maybe':'worth-err'; }
function toggleCard(h) { h.nextElementSibling.classList.toggle('open'); }
function markHeard(enc, dateStr) {
  const name = decodeURIComponent(enc);
  if (dateStr) { lastSeen[name] = dateStr; try { localStorage.setItem('mbLastSeen', JSON.stringify(lastSeen)); } catch(x){} }
  event.target.textContent = 'Heard'; event.target.style.color = '#1a5c1a';
}
function setStatus(t) { document.getElementById('statusText').textContent = t; }
function setProgress(p) { document.getElementById('progressFill').style.width = p + '%'; }
function renderCard(result, idx, isNewEp) {
  if (!result.success) return '<div class="episode-card"><div class="episode-header" style="cursor:default"><div class="ep-number">'+String(idx+1).padStart(2,'0')+'</div><div><div class="ep-show">'+result.podcast+'</div><div class="ep-title" style="color:var(--muted)">Could not load feed</div></div><div class="worth-badge worth-err">-</div></div></div>';
  const ep = result.episode, a = result.analysis;
  const badge = (a && a.worthListening) || '?';
  const dateStr = ep.date ? new Date(ep.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
  const takeaways = (a && a.keyTakeaways && a.keyTakeaways.map(function(t){return '<li>'+t+'</li>';}).join('')) || '<li>See episode for details</li>';
  const topics = (a && a.topics && a.topics.map(function(t){return '<li>'+t+'</li>';}).join('')) || '<li>See description</li>';
  const tldr = (a && a.tldr) || (ep.description && ep.description.slice(0,120)+'...') || 'No summary available';
  return '<div class="episode-card"><div class="episode-header" onclick="toggleCard(this)"><div class="ep-number">'+String(idx+1).padStart(2,'0')+'</div><div><div class="ep-show">'+result.podcast+(isNewEp?' NEW':'')+'</div><div class="ep-title">'+ep.title+'</div><div class="ep-meta">'+(dateStr?'<span>'+dateStr+'</span>':'')+(ep.duration?'<span>'+ep.duration+'</span>':'')+'</div></div><div class="worth-badge '+wClass(badge)+'">'+badge+'</div></div><div class="episode-body"><div class="summary-grid"><div class="summary-block tldr"><h4>TL;DR</h4><p>'+tldr+'</p></div><div class="summary-block"><h4>Key Takeaways</h4><ul>'+takeaways+'</ul></div><div class="summary-block"><h4>Topics</h4><ul>'+topics+'</ul></div></div><div class="ep-links">'+(ep.link?'<a href="'+ep.link+'" target="_blank" class="ep-link">Open Episode</a>':'')+'<a class="ep-link" onclick="markHeard(''+encodeURIComponent(result.podcast)+'',''+( ep.date||'')+'')">Mark as Heard</a></div></div></div>';
}
async function runDigest() {
  const btn = document.getElementById('refreshBtn'), icon = document.getElementById('spinIcon');
  const statusBar = document.getElementById('statusBar'), progressBar = document.getElementById('progressBar');
  const resultsArea = document.getElementById('resultsArea');
  btn.disabled = true; icon.classList.add('spinning');
  statusBar.classList.add('visible'); progressBar.style.display = 'block';
  setProgress(0); resultsArea.innerHTML = '';
  let total = 20;
  try { const r = await fetch('/api/podcasts'); const list = await r.json(); total = list.length; podcastNames = list.map(function(p){return p.name;}); } catch(e) {}
  const results = []; let newCount = 0;
  for (let i = 0; i < total; i++) {
    setStatus('Fetching ' + (podcastNames[i] || 'podcast '+(i+1)) + '... ('+( i+1)+'/'+total+')');
    setProgress(Math.round((i/total)*95));
    try {
      const r = await fetch('/api/fetch/'+i); const data = await r.json();
      const isNewEp = data.success && data.episode && data.episode.date ? isNew(data.podcast, data.episode.date) : false;
      if (isNewEp) { newCount++; if (data.episode.date) lastSeen[data.podcast] = data.episode.date; }
      results.push(Object.assign({}, data, {isNewEp: isNewEp}));
    } catch(e) { results.push({success:false, podcast: podcastNames[i]||'Podcast '+(i+1), isNewEp:false}); }
  }
  try { localStorage.setItem('mbLastSeen', JSON.stringify(lastSeen)); } catch(e) {}
  const order = {YES:0,MAYBE:1,NO:2};
  results.sort(function(a,b){ if(a.isNewEp!==b.isNewEp) return a.isNewEp?-1:1; return ((a.analysis&&order[a.analysis.worthListening])??3)-((b.analysis&&order[b.analysis.worthListening])??3); });
  setProgress(100); setStatus('Done! '+newCount+' new episodes found.');
  const newCards = results.filter(function(r){return r.isNewEp;}), oldCards = results.filter(function(r){return !r.isNewEp;});
  let html = '';
  if (newCards.length) { html += '<div class="section-label">New Episodes <span class="new-tag">'+newCards.length+' NEW</span></div><div class="episodes-grid">'; newCards.forEach(function(r,i){html+=renderCard(r,i,true);}); html += '</div>'; }
  if (oldCards.length) { html += '<div class="section-label">All Shows</div><div class="episodes-grid">'; oldCards.forEach(function(r,i){html+=renderCard(r,newCards.length+i,false);}); html += '</div>'; }
  resultsArea.innerHTML = html;
  document.getElementById('datebar-count').textContent = newCount+' new - '+total+' shows checked';
  btn.disabled = false; icon.classList.remove('spinning');
  setTimeout(function(){ statusBar.classList.remove('visible'); progressBar.style.display='none'; }, 4000);
}
(function() {
  const d = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('masthead-date').textContent = d;
  document.getElementById('datebar-date').textContent = d;
})();
</script>
</body>
    </html>
