<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Brief - Podcast Digest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink: #0d0d0d; --paper: #f5f0e8; --cream: #ede8db; --accent: #c8401a; --gold: #b8933f; --muted: #7a7060; --card-bg: #faf7f2; --border: #d4ccbb; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .masthead { background: var(--ink); color: var(--paper); text-align: center; padding: 28px 20px 20px; }
  .masthead-top { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto 12px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(245,240,232,0.5); }
  .masthead h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 6vw, 3.8rem); font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
  .masthead h1 span { color: var(--accent); }
  .masthead-sub { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,240,232,0.45); margin-top: 8px; }
  .rule { height: 1px; background: rgba(245,240,232,0.15); margin: 14px auto 0; max-width: 900px; }
  .container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }
  .datebar { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 2px solid var(--ink); margin-bottom: 24px; }
  .datebar-date { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; }
  .datebar-count { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .refresh-btn { background: var(--accent); color: white; border: none; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 8px; width: 100%; justify-content: center; margin-bottom: 20px; transition: background 0.2s; }
  .refresh-btn:hover { background: #a8331a; }
  .refresh-btn:disabled { background: var(--muted); cursor: not-allowed; }
  .spinning { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-bar { background: var(--cream); border: 1px solid var(--border); padding: 10px 16px; font-size: 12px; color: var(--muted); margin-bottom: 16px; display: none; align-items: center; gap: 8px; }
  .status-bar.visible { display: flex; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .progress-bar { height: 3px; background: var(--border); margin-bottom: 20px; overflow: hidden; border-radius: 2px; display: none; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
  .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); padding: 10px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 0; display: flex; justify-content: space-between; align-items: center; }
  .new-tag { background: var(--accent); color: white; font-size: 9px; padding: 2px 7px; letter-spacing: 0.1em; }
  .episodes-grid { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 32px; }
  .episode-card { background: var(--card-bg); }
